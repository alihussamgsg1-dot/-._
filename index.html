<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For عناوي ابن حسن</title>

<style>
body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
  background-color: #87CEFA;
}

.background {
  position: fixed;
  width: 100%;
  height: 100%;
  display: flex;
  flex-wrap: wrap;
  opacity: 0.15;
  pointer-events: none;
}

.background span {
  font-size: 18px;
  margin: 4px;
}

.center-text {
  text-align: center;
}

.hint {
  display: block;
  font-size: 12px;
  color: #0066cc;
  opacity: 0.7;
  margin-bottom: 5px;
}

h1 {
  color: #0066cc;
  font-size: 28px;
  text-shadow: 0 0 15px #fff;
  white-space: nowrap;
}

/* 😎 قلوب */
.heart {
  position: absolute;
  bottom: -50px;
  color: #1e90ff;
  font-size: 18px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

/* 💥 انفجار */
.burst {
  position: absolute;
  font-size: 12px;
  animation: burstAnim 1s ease-out forwards;
  pointer-events: none;
}

@keyframes burstAnim {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.3) translateY(-80px); opacity: 0; }
}

/* التوقيع */
.signature {
  position: fixed;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  color: #0066cc;
  direction: rtl;
}
</style>
</head>

<body>

<div class="background" id="bg"></div>
  <div class="center-text"> 
<iframe
width="90"
height="50"
src="https://www.youtube.com/embed/nqxVUiUpUWI"
title="Birthday Song"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
allowfullscreen
style="border-radius:10px;margin-bottom:8px;">
</iframe> 
  <small class="hint">اضغط هنا  👆</small>
  <h1>👊 HAPPY BIRTHDAY BRO 👊<br><small>عناوي ابن حسن</small></h1>
</div>

<div class="signature">الصانع : عناوي حسام</div>

<!-- 🎵 الصوت الجديد -->
<iframe id="bgmusic" width="0" height="0" style="display:none;" src="https://www.youtube.com/embed/nqxVUiUpUWI?autoplay=1&loop=1&playlist=nqxVUiUpUWI" allow="autoplay"></iframe>

<script>
window.addEventListener("load", function () {

  const bg = document.getElementById("bg");

  for (let i = 0; i < 200; i++) {
    const span = document.createElement("span");
    span.innerHTML = "🎂";
    bg.appendChild(span);
  }

  // 😎 قلوب
  function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "😎";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (3 + Math.random() * 2) + "s";

    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }

  setInterval(createHeart, 300);

  // 💥 انفجار
  function burstHearts(x, y) {
    for (let i = 0; i < 6; i++) {
      const b = document.createElement("div");
      b.classList.add("burst");
      b.innerHTML = "😎";

      b.style.left = x + "px";
      b.style.top = y + "px";

      document.body.appendChild(b);
      setTimeout(() => b.remove(), 1000);
    }
  }

  document.addEventListener("click", function(e){
    burstHearts(e.clientX, e.clientY);

    const audio = document.getElementById("bgmusic");
    audio.play();
  });

});
</script>

</body>
</html>
